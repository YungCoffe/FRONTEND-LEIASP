<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Yung Automation Pro</title>
    <style>
        body { background: #0f0f23; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { background: #1a1a3a; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        button { background: #00d4ff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2>Yung Automation</h2>
    <input type="text" id="token" placeholder="Bearer Token">
    <button onclick="buscarLivros()">LISTAR MEUS LIVROS</button>
    
    <select id="listaLivros" style="display:none;">
        <option value="">Selecione um livro...</option>
    </select>
    
    <button id="btnIniciar" style="display:none;" onclick="iniciarLeitura()">INICIAR CICLO</button>
    <div id="status"></div>
</div>

<script>
    async function buscarLivros() {
        const token = document.getElementById('token').value;
        const res = await fetch('https://ualida.serveousercontent.com/buscar-livros', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-api-key': 'YUNG_SECURE_2026' },
            body: JSON.stringify({ token })
        });
        const livros = await res.json();
        
        const select = document.getElementById('listaLivros');
        select.style.display = 'block';
        document.getElementById('btnIniciar').style.display = 'block';
        
        livros.forEach(livro => {
            let opt = document.createElement('option');
            opt.value = livro.id;
            opt.innerHTML = livro.title;
            select.appendChild(opt);
        });
    }

    async function iniciarLeitura() {
        const dados = {
            token: document.getElementById('token').value,
            livro_id: document.getElementById('listaLivros').value,
            ra: "123456" 
        };
        const res = await fetch('https://ualida.serveousercontent.com/iniciar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-api-key': 'YUNG_SECURE_2026' },
            body: JSON.stringify(dados)
        });
        document.getElementById('status').innerText = "✅ Automação rodando!";
    }
</script>
</body>
</html>
