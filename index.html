<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Yung Automation Pro</title>
    <style>
        body { background: #0f0f23; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1a1a3a; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }
        input, select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background: #0f0f23; color: white; box-sizing: border-box; }
        button { background: #00d4ff; color: #0f0f23; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Yung Automation</h2>
    <input type="text" id="ra" placeholder="RA + digito + sp">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="fazerLogin()">ENTRAR</button>

    <select id="listaLivros" style="display:none;"></select>
    <button id="btnIniciar" style="display:none;" onclick="iniciarLeitura()">INICIAR CICLO</button>
    <div id="status"></div>
</div>

<script>
    const BASE_URL = "https://serveousercontent.com:45349";
    let tokenSalvo = "";

    async function fazerLogin() {
        const ra = document.getElementById('ra').value;
        const senha = document.getElementById('senha').value;

        const res = await fetch(`${BASE_URL}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-api-key': 'YUNG_SECURE_2026' },
            body: JSON.stringify({ ra, senha })
        });
        const data = await res.json();
        
        if(data.token) {
            tokenSalvo = data.token;
            buscarLivros(tokenSalvo);
        } else {
            alert("Erro no login");
        }
    }

    async function buscarLivros(token) {
        const res = await fetch(`${BASE_URL}/buscar-livros`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-api-key': 'YUNG_SECURE_2026' },
            body: JSON.stringify({ token })
        });
        const livros = await res.json();
        
        const select = document.getElementById('listaLivros');
        select.style.display = 'block';
        document.getElementById('btnIniciar').style.display = 'block';
        
        select.innerHTML = '<option value="">Selecione um livro...</option>';
        livros.forEach(livro => {
            let opt = document.createElement('option');
            opt.value = livro.id;
            opt.innerHTML = livro.title;
            select.appendChild(opt);
        });
    }

    async function iniciarLeitura() {
        const livro_id = document.getElementById('listaLivros').value;
        const res = await fetch(`${BASE_URL}/iniciar`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-api-key': 'YUNG_SECURE_2026' },
            body: JSON.stringify({ token: tokenSalvo, livro_id, ra: document.getElementById('ra').value })
        });
        const status = await res.json();
        document.getElementById('status').innerText = status.status === "sucesso" ? "✅ Automação rodando!" : "❌ Erro ao iniciar.";
    }
</script>
</body>
</html>
