<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yung Automation Pro</title>
    <style>
        body { background: #0f0f23; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1a1a3a; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #00d4ff; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background: #0f0f23; color: white; box-sizing: border-box; }
        button { background: #00d4ff; color: #0f0f23; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #00a3c4; }
        #status { margin-top: 15px; font-size: 0.9em; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <h2>Yung Automation</h2>
    <input type="text" id="ra" placeholder="RA + digito + sp">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="fazerLogin()">ENTRAR</button>

    <select id="listaLivros" style="display:none;"></select>
    <button id="btnIniciar" style="display:none;" onclick="iniciarLeitura()">INICIAR CICLO</button>
    <div id="status"></div>
</div>

<script>
    // Apenas o backend (Termux) é usado para a AÇÃO final, não para busca
    const BASE_URL = "https://yung.serveousercontent.com"; 
    let tokenSalvo = "";

    async function fazerLogin() {
        const ra = document.getElementById('ra').value;
        const senha = document.getElementById('senha').value;
        document.getElementById('status').innerText = "Autenticando...";

        // Aqui mantemos o login pelo seu servidor para pegar o token original
        try {
            const res = await fetch(`${BASE_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ra, senha })
            });
            const data = await res.json();
            if(data.token) {
                tokenSalvo = data.token;
                buscarLivros(tokenSalvo);
            } else {
                document.getElementById('status').innerText = "Erro no login.";
            }
        } catch (e) {
            document.getElementById('status').innerText = "Erro no servidor Termux.";
        }
    }

    async function buscarLivros(token) {
        document.getElementById('status').innerText = "Buscando livros...";
        try {
            // BUSCA DIRETA - Contorna o erro de servidor
            const res = await fetch('https://prod-apistudent.elefanteletrado.com.br/v1/library/genres/2/11', {
                method: 'GET',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Origin': 'https://em.elefanteletrado.com.br',
                    'Referer': 'https://em.elefanteletrado.com.br/library/multimodal'
                }
            });
            
            const data = await res.json();
            const lista = data.Books || data.Items || data;
            const select = document.getElementById('listaLivros');
            
            select.innerHTML = '<option value="">Selecione um livro...</option>';
            lista.forEach(livro => {
                let opt = document.createElement('option');
                opt.value = livro.Id || livro.id;
                opt.innerHTML = livro.Title || livro.title;
                select.appendChild(opt);
            });
            
            select.style.display = 'block';
            document.getElementById('btnIniciar').style.display = 'block';
            document.getElementById('status').innerText = "Escolha um livro:";
        } catch (e) {
            document.getElementById('status').innerText = "Erro na busca direta.";
        }
    }

    async function iniciarLeitura() {
        const livro_id = document.getElementById('listaLivros').value;
        // O início da leitura volta a ser pelo seu servidor Termux
        const res = await fetch(`${BASE_URL}/iniciar`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: tokenSalvo, livro_id })
        });
        const data = await res.json();
        document.getElementById('status').innerText = data.msg || "Executado!";
    }
</script>
</body>
</html>
